# Standard Docusaurus GitHub Pages deploy.
#
# TODO before enabling Pages:
#   - Set `url`, `baseUrl`, `organizationName`, `projectName` in docusaurus.config.ts
#     to real values (they are placeholders right now).
#   - In the repo: Settings → Pages → Build and deployment → Source = "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions needed for the GitHub Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build website (released locales only)
        # Plain build: HANDBOOK_INCLUDE_UNRELEASED is unset, so LOCALES is only the
        # released locales (en, ru). Unreleased locales (e.g. sk) are validated in CI
        # but deliberately excluded from the public deploy until they're launch-ready.
        run: npm run build
      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
