# CI gates for every Pull Request (and every branch push except `main`).
#
# `main` is covered by the separate deploy workflow (.github/workflows/deploy.yml),
# so we skip pushes to `main` here to avoid running the same build twice.
#
# Gates (all must pass — branch protection should require them):
#   1. build   — `npm run build` for BOTH locales; the real correctness gate
#                (onBrokenLinks: 'throw' catches dead internal links; a broken i18n
#                tree fails the build).
#   2. lint    — markdown structure/format hygiene (markdownlint-cli2).
#   3. leak    — generic secret / credential / local-path / email scan.
name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (both locales)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build website (all locales, including unreleased)
        # HANDBOOK_INCLUDE_UNRELEASED=1 pulls the unreleased locales (e.g. sk) into
        # LOCALES so their i18n tree is built and broken-link/i18n-validated here —
        # the deploy workflow leaves this unset, so the public site never serves them.
        run: HANDBOOK_INCLUDE_UNRELEASED=1 npm run build

  lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Markdown lint
        run: npm run lint:md

  leak-scan:
    name: Generic leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generic leak scan
        run: bash scripts/leak-scan.sh
